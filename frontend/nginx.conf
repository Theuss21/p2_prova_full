server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Roteamento de SPA: qualquer caminho não encontrado cai no index.html,
    # deixando o React Router decidir o que renderizar.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # env-config.js é gerado em tempo de execução (docker-entrypoint.sh) e
    # nunca deve ser cacheado pelo navegador.
    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
